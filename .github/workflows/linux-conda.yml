name: Linux Conda Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-linux-conda:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: build
          auto-activate-base: false
          channels: conda-forge,defaults
          channel-priority: strict
          python-version: "3.12"

      - name: Install build tools
        run: |
          conda install -y conda-build anaconda-client

      - name: Build conda package
        env:
          CONDA_BLD_PATH: /tmp/conda-bld
        run: |
          mkdir -p "$CONDA_BLD_PATH"
          conda build recipe --output-folder "$CONDA_BLD_PATH"

      - name: Collect built package paths
        id: packages
        env:
          CONDA_BLD_PATH: /tmp/conda-bld
        run: |
          package_list="$RUNNER_TEMP/wavping-package-paths.txt"
          conda build recipe --output-folder "$CONDA_BLD_PATH" --output | tee "$package_list"
          package_count="$(grep -c . "$package_list" || true)"
          if [ "$package_count" -eq 0 ]; then
            echo "No conda package paths were produced" >&2
            exit 1
          fi
          echo "list=$package_list" >> "$GITHUB_OUTPUT"
          echo "Built package count: $package_count"

      - name: Upload conda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wavping-conda-linux-64
          path: |
            /tmp/conda-bld/linux-64/*.conda
            /tmp/conda-bld/linux-64/*.tar.bz2
          if-no-files-found: error

  upload-linux-conda:
    runs-on: ubuntu-latest
    needs: build-linux-conda
    if: startsWith(github.ref, 'refs/tags/')

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Download built package artifact
        uses: actions/download-artifact@v4
        with:
          name: wavping-conda-linux-64
          path: /tmp/wavping-conda-linux-64

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: upload
          auto-activate-base: false
          channels: conda-forge,defaults
          channel-priority: strict
          python-version: "3.12"

      - name: Install upload client
        run: |
          conda install -y anaconda-client

      - name: Upload package to Anaconda.org
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          if [ -z "$ANACONDA_API_TOKEN" ]; then
            echo "Missing required GitHub secret: ANACONDA_API_TOKEN" >&2
            exit 1
          fi
          mapfile -t package_paths < <(find /tmp/wavping-conda-linux-64 -type f \( -name '*.conda' -o -name '*.tar.bz2' \) | sort)
          if [ "${#package_paths[@]}" -eq 0 ]; then
            echo "No conda package artifact found to upload" >&2
            exit 1
          fi
          python -m binstar_client.scripts.cli -t "$ANACONDA_API_TOKEN" upload --skip-existing "${package_paths[@]}"
