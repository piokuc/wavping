name: Windows Conda Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-conda:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: build
          auto-activate-base: false
          channels: conda-forge,defaults
          channel-priority: strict
          python-version: "3.12"

      - name: Install build tools
        run: |
          conda install -y conda-build anaconda-client

      - name: Build conda package
        env:
          CONDA_BLD_PATH: ${{ runner.temp }}\conda-bld
        run: |
          New-Item -ItemType Directory -Force -Path $env:CONDA_BLD_PATH | Out-Null
          conda build recipe --output-folder $env:CONDA_BLD_PATH

      - name: Resolve built package path
        id: package
        env:
          CONDA_BLD_PATH: ${{ runner.temp }}\conda-bld
        run: |
          $packagePath = conda build recipe --output-folder $env:CONDA_BLD_PATH --output | Select-Object -Last 1
          if (-not $packagePath) {
            throw "No conda package path was produced"
          }
          "path=$packagePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Built package: $packagePath"

      - name: Upload conda artifact
        uses: actions/upload-artifact@v4
        with:
          name: wavping-conda-win-64
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

  upload-windows-conda:
    runs-on: windows-latest
    needs: build-windows-conda
    if: startsWith(github.ref, 'refs/tags/')

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Download built package artifact
        uses: actions/download-artifact@v4
        with:
          name: wavping-conda-win-64
          path: ${{ runner.temp }}\wavping-conda-win-64

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: upload
          auto-activate-base: false
          channels: conda-forge,defaults
          channel-priority: strict
          python-version: "3.12"

      - name: Install upload client
        run: |
          conda install -y anaconda-client

      - name: Upload package to Anaconda.org
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          if (-not $env:ANACONDA_API_TOKEN) {
            throw "Missing required GitHub secret: ANACONDA_API_TOKEN"
          }

          $packagePath = Get-ChildItem -Path $env:RUNNER_TEMP\wavping-conda-win-64 -Recurse -File |
            Where-Object { $_.Name -like '*.conda' -or $_.Name -like '*.tar.bz2' } |
            Select-Object -First 1

          if (-not $packagePath) {
            throw "No conda package artifact found to upload"
          }

          python -m binstar_client.scripts.cli -t $env:ANACONDA_API_TOKEN upload --skip-existing $packagePath.FullName
