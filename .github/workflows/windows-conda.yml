name: Windows Conda Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-conda:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: build
          auto-activate-base: false
          channels: conda-forge,defaults
          channel-priority: strict
          python-version: "3.12"

      - name: Install build tools
        run: |
          conda install -y conda-build anaconda-client

      - name: Set up MSVC build environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Diagnose compiler toolchain
        run: |
          where cl
          cl

      - name: Build conda package
        env:
          CONDA_BLD_PATH: C:\cb
        run: |
          New-Item -ItemType Directory -Force -Path $env:CONDA_BLD_PATH | Out-Null
          conda build recipe --croot $env:CONDA_BLD_PATH --output-folder $env:CONDA_BLD_PATH

      - name: Collect built package paths
        id: packages
        env:
          CONDA_BLD_PATH: C:\cb
        run: |
          $packagePaths = @(conda build recipe --croot $env:CONDA_BLD_PATH --output-folder $env:CONDA_BLD_PATH --output)
          if (-not $packagePaths -or $packagePaths.Count -eq 0) {
            throw "No conda package paths were produced"
          }
          $packageList = Join-Path $env:RUNNER_TEMP "wavping-package-paths.txt"
          $packagePaths | Out-File -FilePath $packageList -Encoding utf8
          "list=$packageList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Built package count: $($packagePaths.Count)"

      - name: Upload conda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wavping-conda-win-64
          path: |
            C:\cb\win-64\*.conda
            C:\cb\win-64\*.tar.bz2
          if-no-files-found: error

  upload-windows-conda:
    runs-on: windows-latest
    needs: build-windows-conda
    if: startsWith(github.ref, 'refs/tags/')

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Download built package artifact
        uses: actions/download-artifact@v4
        with:
          name: wavping-conda-win-64
          path: ${{ runner.temp }}\wavping-conda-win-64

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: upload
          auto-activate-base: false
          channels: conda-forge,defaults
          channel-priority: strict
          python-version: "3.12"

      - name: Install upload client
        run: |
          conda install -y anaconda-client

      - name: Upload package to Anaconda.org
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          if (-not $env:ANACONDA_API_TOKEN) {
            throw "Missing required GitHub secret: ANACONDA_API_TOKEN"
          }

          $packagePaths = Get-ChildItem -Path $env:RUNNER_TEMP\wavping-conda-win-64 -Recurse -File |
            Where-Object { $_.Name -like '*.conda' -or $_.Name -like '*.tar.bz2' } |
            Sort-Object FullName

          if (-not $packagePaths) {
            throw "No conda package artifact found to upload"
          }

          $packageArgs = $packagePaths | ForEach-Object { $_.FullName }
          python -m binstar_client.scripts.cli -t $env:ANACONDA_API_TOKEN upload --skip-existing @packageArgs
